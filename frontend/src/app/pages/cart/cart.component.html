<div class="container" style="max-width:640px;">
  <div class="page-header">
    <i class="bi bi-cart3" style="font-size:1.75rem; color:#4a6fa5;"></i>
    <h2>Seu Carrinho</h2>
  </div>

  <!-- Empty state -->
  <div *ngIf="cart.cart().items.length === 0" style="text-align:center; padding:3rem 0; color:#999;">
    <i class="bi bi-cart-x" style="font-size:4rem;"></i>
    <p style="margin-top:1rem;">Seu carrinho está vazio.</p>
    <p-button label="Ver Restaurantes" icon="pi pi-arrow-left" routerLink="/"></p-button>
  </div>

  <!-- Cart items -->
  <p-card *ngIf="cart.cart().items.length > 0">
    <div *ngIf="cart.cart().restaurant" style="margin-bottom:1rem; color:#666; font-size:0.9rem;">
      <i class="bi bi-shop"></i> {{ cart.cart().restaurant!.name }}
    </div>

    <div *ngFor="let entry of cart.cart().items"
         style="display:flex; justify-content:space-between; align-items:center;
                padding:0.6rem 0; border-bottom:1px solid #f0f0f0;">
      <div>
        <span style="font-weight:500;">{{ entry.menuItem.name }}</span>
        <span style="color:#888; margin-left:0.5rem;">× {{ entry.quantity }}</span>
      </div>
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <span style="color:#16a34a; font-weight:600;">
          R$ {{ entry.menuItem.price * entry.quantity | number:'1.2-2' }}
        </span>
        <button
          (click)="remove(entry.menuItem.id)"
          style="background:none; border:none; cursor:pointer; color:#ef4444; padding:0.2rem;">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>

    <p-divider></p-divider>

    <div style="display:flex; justify-content:space-between; font-size:1.1rem; font-weight:700; margin-bottom:1rem;">
      <span>Total</span>
      <span style="color:#16a34a;">R$ {{ cart.total() | number:'1.2-2' }}</span>
    </div>

    <div style="display:flex; gap:0.75rem; justify-content:flex-end; flex-wrap:wrap;">
      <p-button label="Continuar Comprando" icon="pi pi-arrow-left"
                styleClass="p-button-secondary p-button-outlined" routerLink="/"></p-button>
      <p-button label="Finalizar Pedido" icon="pi pi-credit-card"
                (onClick)="checkout()"></p-button>
    </div>
  </p-card>
</div>
